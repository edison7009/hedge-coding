<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hedge Coding — AI-powered context compiler for smarter, cheaper development sessions." />
    <title>Hedge Coding</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Apply theme BEFORE React renders to prevent flash of unstyled variables -->
    <script>
      (function() {
        var theme = 'dark';
        try { theme = localStorage.getItem('hc-theme') || 'dark'; } catch(e) {}
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
