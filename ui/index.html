<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Coder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- ─── Sidebar ──────────────────────── -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="app-logo">
                    <svg class="logo-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                    <span class="logo-text">Budget Coder</span>
                </div>

                <nav class="sidebar-nav">
                    <button class="nav-item active" id="nav-workspace" onclick="switchView('workspace')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                        <span data-i18n="nav.workspace">Workspace</span>
                    </button>
                    <button class="nav-item" id="nav-files" onclick="switchView('files')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                        <span data-i18n="nav.files">Files</span>
                        <span class="nav-badge" id="file-count-badge">0</span>
                    </button>
                    <button class="nav-item" id="nav-output" onclick="switchView('output')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <span data-i18n="nav.output">Output</span>
                        <span class="nav-dot" id="output-dot"></span>
                    </button>
                </nav>
            </div>

            <!-- File Explorer (shown when Files nav is active) -->
            <div class="sidebar-panel" id="panel-files">
                <div class="panel-header">
                    <span data-i18n="explorer">EXPLORER</span>
                    <div class="panel-actions">
                        <button class="icon-btn small" id="btn-select-all" title="Select All">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                        </button>
                        <button class="icon-btn small" id="btn-deselect-all" title="Deselect All">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                        </button>
                    </div>
                </div>
                <div class="file-tree" id="file-tree"></div>
            </div>

            <!-- Bottom controls -->
            <div class="sidebar-bottom">
                <div class="sidebar-controls">
                    <button class="icon-btn" id="btn-theme" title="Toggle theme">
                        <span id="theme-icon">☀️</span>
                    </button>
                    <button class="icon-btn" id="btn-lang" onclick="toggleLang()" title="Switch language">
                        <span id="lang-label">中文</span>
                    </button>
                </div>
                <div class="connection-status">
                    <span class="status-dot" id="status-dot"></span>
                    <span class="status-text" id="status-text" data-i18n="status.connecting">Connecting...</span>
                </div>
            </div>
        </aside>

        <!-- ─── Main Content ─────────────────── -->
        <main class="main">
            <!-- Workspace View (default) -->
            <div class="view active" id="view-workspace">
                <div class="workspace-center">
                    <div class="greeting">
                        <span class="greeting-icon">⚡</span>
                        <h1 data-i18n="greeting.title">Let's build</h1>
                        <p class="greeting-sub" data-i18n="greeting.sub">Let cheap models read, let expensive models write.</p>
                    </div>

                    <!-- Model Card -->
                    <div class="model-badge">
                        <span class="model-badge-dot" id="model-status">○</span>
                        <span class="model-badge-name" id="model-name" data-i18n="model.loading">Loading...</span>
                        <span class="model-badge-url" id="model-url">—</span>
                    </div>
                </div>
            </div>

            <!-- Files View (repo map) -->
            <div class="view" id="view-files">
                <div class="view-header">
                    <h2 data-i18n="repomap">Repo Map</h2>
                    <div class="view-meta">
                        <span id="stat-indexed"></span>
                        <span class="meta-sep">•</span>
                        <span id="stat-symbols"></span>
                    </div>
                </div>
                <div class="repo-map-content" id="repo-map"></div>
            </div>

            <!-- Output View (super prompt) -->
            <div class="view" id="view-output">
                <div class="view-header">
                    <h2 data-i18n="nav.output">Output</h2>
                    <div class="output-actions">
                        <button class="action-btn" id="btn-copy" onclick="copyToClipboard()" disabled>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                            <span data-i18n="copy.xml">Copy XML</span>
                        </button>
                        <button class="action-btn" id="btn-download" onclick="downloadXml()" disabled>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            <span data-i18n="download">Download</span>
                        </button>
                    </div>
                </div>
                <!-- Cost estimation -->
                <div class="cost-bar">
                    <div class="cost-tokens">
                        <span class="cost-label">—</span>
                        <span class="cost-value" id="token-count">0</span>
                        <span class="cost-unit" data-i18n="tokens">tokens</span>
                    </div>
                    <div class="cost-prices">
                        <span class="cost-item">Opus 4.6 <b id="cost-opus">—</b></span>
                        <span class="cost-item">Sonnet 4.6 <b id="cost-sonnet">—</b></span>
                        <span class="cost-item">GPT-4o <b id="cost-gpt4o">—</b></span>
                    </div>
                </div>
                <div class="output-content" id="prompt-output">
                    <div class="empty-state">
                        <p data-i18n="output.empty">Compile a Super Prompt to see the output here.</p>
                    </div>
                </div>
            </div>

            <!-- ─── Bottom Input Bar ─────────── -->
            <div class="input-bar">
                <div class="input-wrapper">
                    <textarea
                        class="goal-input"
                        id="goal-input"
                        rows="1"
                        data-i18n-placeholder="goal.placeholder"
                        placeholder="Describe what you want to build or change..."
                    ></textarea>
                    <div class="input-controls">
                        <div class="input-left">
                            <span class="selected-badge" id="selected-count" data-i18n="files.selected.zero">0 files selected</span>
                        </div>
                        <div class="input-right">
                            <button class="compile-btn" id="btn-compile" onclick="compilePrompt()" disabled>
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M11.251.068a.5.5 0 0 1 .227.58L9.677 6.5H13a.5.5 0 0 1 .364.843l-8 8.5a.5.5 0 0 1-.842-.49L6.323 9.5H3a.5.5 0 0 1-.364-.843l8-8.5a.5.5 0 0 1 .615-.09z"/></svg>
                                <span data-i18n="compile">Compile</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="i18n.js"></script>
    <script src="app.js"></script>
</body>
</html>
